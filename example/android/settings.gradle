pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.2.1" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

// SPEC-070-C D13 on-branch override: substitute the LOCAL sdk-android build for the
// published ai.appdna:sdk-android artifact when APPDNA_ANDROID_SDK_PATH is set, so
// unreleased native (D10 veto seams) is compile-verified before publish. Unset in
// CI/publish → the mavenCentral artifact from the plugin's dependency is used.
def localAndroidSdk = System.getenv("APPDNA_ANDROID_SDK_PATH")
if (localAndroidSdk?.trim()) {
    includeBuild(localAndroidSdk) {
        dependencySubstitution {
            substitute module("ai.appdna:sdk-android") using project(":")
        }
    }
}

include ":app"
