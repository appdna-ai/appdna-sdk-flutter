pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.2.1" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

// SPEC-070-C D13 on-branch override: the local sdk-android is consumed via mavenLocal
// (see the root build.gradle repositories + `./gradlew publishToMavenLocal` on the SDK),
// NOT a composite includeBuild — the SDK is on AGP 8.7.3/Gradle 8.9 and the example on
// AGP 8.2.1, which Gradle forbids mixing in one build. mavenLocal consumes the prebuilt
// AAR instead, sidestepping the AGP-version conflict.

include ":app"
