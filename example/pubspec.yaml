name: appdna_sdk_example
description: Example app demonstrating all AppDNA SDK v0.3 capabilities.

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  appdna_sdk:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  # Bundle the Material Icons font so the demo's Icons.* glyphs render (without
  # this they show as "?" tofu boxes).
  uses-material-design: true
