name: appdna_sdk
description: AppDNA SDK for Flutter — analytics, experiments, paywalls, surveys, and more.
version: 1.0.0
homepage: https://appdna.ai

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.appdna.flutter
        pluginClass: AppdnaPlugin
      ios:
        pluginClass: AppdnaPlugin
