name: appdna_sdk
description: AppDNA SDK for Flutter — analytics, experiments, paywalls, surveys, and more.
version: 1.0.2
homepage: https://appdna.ai
repository: https://github.com/appdna-ai/appdna-sdk-flutter

# AppDNA cross-platform feature-parity marker (SPEC-070-0).
# This Flutter package wraps iOS + Android native SDKs at the version below.
# CI (`pnpm check:version-lockstep`) verifies this matches iOS's `s.version`.
appdna_feature_parity: 1.0.61

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.appdna.flutter
        pluginClass: AppdnaPlugin
      ios:
        pluginClass: AppdnaPlugin
