name: appdna_sdk
description: AppDNA SDK for Flutter — analytics, experiments, paywalls, surveys, and more.
version: 1.0.9
homepage: https://appdna.ai
repository: https://github.com/appdna-ai/appdna-sdk-flutter

# AppDNA cross-platform feature-parity marker (SPEC-070-0).
# This Flutter package wraps iOS + Android native SDKs at the version below.
# CI (`pnpm check:version-lockstep`) verifies this matches iOS's `s.version`.
# 1.0.67 = SPEC-419 render-contract / visual-parity pass (per-option select
# badge, leading/trailing labels, per-index structural-parity nodes, applied-
# config readiness signal). This is purely native (the new rendering lives in
# the native iOS/Android onboarding renderers); a Flutter app embedding the
# native SDKs gets it automatically — no Dart change. The publishable `version`
# above stays put. Flutter remains a thin wrapper per ADR-001.
appdna_feature_parity: 1.0.70

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.appdna.flutter
        pluginClass: AppdnaPlugin
      ios:
        pluginClass: AppdnaPlugin
